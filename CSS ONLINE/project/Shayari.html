<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Andaze.shayarana |Official</title>

<style>

body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background:#f4f4f4;
    transition:0.4s;
}

.dark-mode{
    background:#121212;
    color:white;
}

header{
    background:#111;
    color:white;
    padding:20px;
    text-align:center;
    font-size:26px;
    letter-spacing:2px;
}

.container{
    width:90%;
    max-width:900px;
    margin:20px auto;
}

.controls{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:20px;
}

input, select{
    padding:8px;
    border-radius:5px;
    border:1px solid #ccc;
}

button{
    padding:8px 15px;
    border:none;
    background:#111;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    opacity:0.8;
}

.card{
    background:white;
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    transition:0.3s;
}

.dark-mode .card{
    background:#1e1e1e;
}

.card h3{
    margin:0;
    color:#444;
}

.dark-mode .card h3{
    color:#ddd;
}

.like{
    margin-top:10px;
    font-size:14px;
    cursor:pointer;
    color:red;
}

footer{
    text-align:center;
    padding:15px;
    background:#111;
    color:white;
    margin-top:20px;
}

</style>
</head>

<body>

<header>
Hassan Shayari Official
</header>

<div class="container">

<div class="controls">
<input type="text" id="search" placeholder="Search Shayari...">
<select id="category">
<option value="all">All</option>
<option value="naat">Naat</option>
<option value="ghazal">Ghazal</option>
<option value="love">Love</option>
<option value="islamic">Islamic</option>
</select>
<button onclick="toggleMode()">Dark Mode</button>
</div>

<div class="card" data-category="ghazal">
<h3>حسان</h3>
<p>
کبھی تنہا، کبھی روشن، کبھی حالات جیسی<br>
زندگی لگتی ہے مجھ کو اک رات جیسی
</p>
<div class="like" onclick="like(this)">❤️ Like (<span>0</span>)</div>
</div>

<div class="card" data-category="naat">
<h3>حسان</h3>
<p>
مصطفیٰ کی شان میں کیا کہوں میں اے خدا<br>
لفظ کم پڑ جاتے ہیں مدینے کی فضا
</p>
<div class="like" onclick="like(this)">❤️ Like (<span>0</span>)</div>
</div>

</div>

<footer>
© 2026 Hassan Shayari Website | Made by حسان
</footer>

<script>

function toggleMode(){
    document.body.classList.toggle("dark-mode");
}

function like(element){
    let span = element.querySelector("span");
    let count = parseInt(span.innerText);
    span.innerText = count + 1;
}

document.getElementById("search").addEventListener("keyup", function(){
    let value = this.value.toLowerCase();
    let cards = document.querySelectorAll(".card");

    cards.forEach(card=>{
        card.style.display = card.innerText.toLowerCase().includes(value) ? "block" : "none";
    });
});

document.getElementById("category").addEventListener("change", function(){
    let value = this.value;
    let cards = document.querySelectorAll(".card");

    cards.forEach(card=>{
        if(value === "all" || card.dataset.category === value){
            card.style.display = "block";
        } else {
            card.style.display = "none";
        }
    });
});

</script>

</body>
</html>
